system_auto-install:
    auto-install-config: enable
    auto-install-image: enable

system_console:

system_ntp:
    ntpsync: enable
    server-mode: enable
    interface: "fortilink"

system_ftm-push:
    server-cert: "Fortinet_Factory"

system_automation-trigger:
    - Network Down:
        description: "Default automation trigger configuration for when a network connection goes down."
        event-type: event-log
        logid: 20099
        fields:
            - 1:
                name: "status"
                value: "DOWN"



    - HA Failover:
        description: "Default automation trigger configuration for when an HA failover occurs."
        event-type: ha-failover

    - Reboot:
        description: "Default automation trigger configuration for when a FortiGate is rebooted."
        event-type: reboot

    - FortiAnalyzer Connection Down:
        description: "Default automation trigger configuration for when the FortiAnalyzer connection is lost."
        event-type: event-log
        logid: 22902

    - License Expired Notification:
        description: "Default automation trigger configuration for when a license is near expiration."
        event-type: license-near-expiry
        license-type: any

    - Local Cert Expired Notification:
        description: "Default automation trigger configuration for when a local certificate is near expiration."

    - Compromised Host - High:
        description: "Default automation trigger configuration for when a high severity compromised host is detected."

    - Incoming Webhook Call:
        description: "Default automation trigger configuration for an incoming webhook."
        event-type: incoming-webhook

    - Security Rating Notification:
        description: "Default automation trigger configuration for when a new Security Rating report is available."
        event-type: security-rating-summary
        report-type: any


system_automation-action:
    - Default Email:
        description: "Default automation action configuration for sending an email with basic information on the log event."
        action-type: email
        email-subject: "%%log.logdesc%%"

    - FortiExplorer Notification:
        description: "Default automation action configuration for sending a notification to any FortiExplorer mobile application."
        action-type: fortiexplorer-notification

    - Quarantine on FortiSwitch + FortiAP:
        description: "Default automation action configuration for quarantining a MAC address on FortiSwitches and FortiAPs."
        action-type: quarantine

    - Quarantine FortiClient EMS Endpoint:
        description: "Default automation action configuration for quarantining a FortiClient EMS endpoing device."
        action-type: quarantine-forticlient

    - Reboot FortiGate:
        description: "Default automation action configuration for rebooting this FortiGate unit."
        action-type: system-actions
        system-action: reboot
        minimum-interval: 300

    - Shutdown FortiGate:
        description: "Default automation action configuration for shuting down this FortiGate unit."
        action-type: system-actions
        system-action: shutdown

    - Backup Config Disk:
        description: "Default automation action configuration for backing up the configuration on disk."
        action-type: system-actions
        system-action: backup-config


system_automation-stitch:
    - Network Down:
        description: "Default automation stitch to send an email when a network goes down."
        status: disable
        trigger: "Network Down"
        actions:
            - 1:
                action: "Default Email"



    - HA Failover:
        description: "Default automation stitch to send an email when a HA failover is detected."
        status: disable
        trigger: "HA Failover"
        actions:
            - 1:
                action: "Default Email"



    - Reboot:
        description: "Default automation stitch to send an email when a FortiGate is rebooted."
        status: disable
        trigger: "Reboot"
        actions:
            - 1:
                action: "Default Email"



    - FortiAnalyzer Connection Down:
        description: "Default automation stitch to send a FortiExplorer notification when the connection to FortiAnalyzer is lost."
        trigger: "FortiAnalyzer Connection Down"
        actions:
            - 1:
                action: "FortiExplorer Notification"



    - License Expired Notification:
        description: "Default automation stitch to send a FortiExplorer notification when a license is near expiration."
        trigger: "License Expired Notification"
        actions:
            - 1:
                action: "FortiExplorer Notification"



    - Compromised Host Quarantine:
        description: "Default automation stitch to quarantine a high severity compromised host on FortiAPs, FortiSwitches, and FortiClient EMS."
        status: disable
        trigger: "Compromised Host - High"
        actions:
            - 1:
                action: "Quarantine on FortiSwitch + FortiAP"

            - 2:
                action: "Quarantine FortiClient EMS Endpoint"



    - Incoming Webhook Quarantine:
        description: "Default automation stitch to quarantine a provided MAC address on FortiAPs, FortiSwitches, and FortiClient EMS using an Incoming Webhook."
        status: disable
        trigger: "Incoming Webhook Call"
        actions:
            - 1:
                action: "Quarantine on FortiSwitch + FortiAP"

            - 2:
                action: "Quarantine FortiClient EMS Endpoint"



    - Security Rating Notification:
        description: "Default automation stitch to send a FortiExplorer notification when a new Security Rating report is available."
        trigger: "Security Rating Notification"
        actions:
            - 1:
                action: "FortiExplorer Notification"




system_federated-upgrade:
    status: disabled

system_ike:

system_ipam:
    pools:
        - default-pool:
            subnet: 172.31.0.0 255.255.0.0

        - lan-pool:
            subnet: 192.168.0.0 255.255.0.0


    rules:
        - role-lan:
            device: "*"
            interface: "*"
            role: lan
            pool: "lan-pool"
            dhcp: enable



system_object-tagging:
    - default:


switch-controller_traffic-policy:
    - quarantine:
        description: "Rate control for quarantined traffic"
        guaranteed-bandwidth: 163840
        guaranteed-burst: 8192
        maximum-burst: 163840
        cos-queue: 0
        id: 1

    - sniffer:
        description: "Rate control for sniffer mirrored traffic"
        guaranteed-bandwidth: 50000
        guaranteed-burst: 8192
        maximum-burst: 163840
        cos-queue: 0
        id: 2


switch-controller_fortilink-settings:
    - fortilink:
        fortilink: "fortilink"
        nac-ports:
            onboarding-vlan: "onboarding"
            lan-segment: enabled
            nac-lan-interface: "nac_segment"
            nac-segment-vlans: "voice" "video"



system_settings:

system_replacemsg-group:
    - auth-intf-quarantine:
        comment: "This is quarantine notification replacement message for quarantine VLAN interface"
        group-type: auth
        auth:
            - auth-disclaimer-page-1:
                buffer: "<!DOCTYPE html>
<html lang=\"en\">
    <head>
        <meta charset=\"UTF-8\">
        <meta http-equiv=\"X-UA-Compatible\" content=\"IE=8; IE=EDGE\">
        <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">
        <style type=\"text/css\">
            body {
                height: 100%;
                font-family: Helvetica, Arial, sans-serif;
                color: #6a6a6a;
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            input[type=date], input[type=email], input[type=number], input[type=password], input[type=search], input[type=tel], input[type=text], input[type=time], input[type=url], select, textarea {
                color: #262626;
                vertical-align: baseline;
                margin: .2em;
                border-style: solid;
                border-width: 1px;
                border-color: #a9a9a9;
                background-color: #fff;
                box-sizing: border-box;
                padding: 2px .5em;
                appearance: none;
                border-radius: 0;
            }
            input:focus {
                border-color: #646464;
                box-shadow: 0 0 1px 0 #a2a2a2;
                outline: 0;
            }
            button {
                padding: .5em 1em;
                border: 1px solid;
                border-radius: 3px;
                min-width: 6em;
                font-weight: 400;
                font-size: .8em;
                cursor: pointer;
            }
            button.primary {
                color: #fff;
                background-color: rgb(47, 113, 178);
                border-color: rgb(34, 103, 173);
            }
            .message-container {
                height: 500px;
                width: 600px;
                padding: 0;
                margin: 10px;
            }
            .logo {
                background: url(%%IMAGE:logo_v3_fguard_app%%) no-repeat left center;
                height: 267px;
                object-fit: contain;
            }
            table {
                background-color: #fff;
                border-spacing: 0;
                margin: 1em;
            }
            table > tbody > tr > td:first-of-type:not([colspan]) {
                white-space: nowrap;
                color: rgba(0,0,0,.5);
            }
            table > tbody > tr > td:first-of-type {
                vertical-align: top;
            }
            table > tbody > tr > td {
                padding: .3em .3em;
            }
            .field {
                display: table-row;
            }
            .field > :first-child {
                display: table-cell;
                width: 20%;
            }
            .field.single > :first-child {
                display: inline;
            }
            .field > :not(:first-child) {
                width: auto;
                max-width: 100%;
                display: inline-flex;
                align-items: baseline;
                virtical-align: top;
                box-sizing: border-box;
                margin: .3em;
            }
            .field > :not(:first-child) > input {
                width: 230px;
            }
            .form-footer {
                display: inline-flex;
                justify-content: flex-start;
            }
            .form-footer > * {
                margin: 1em;
            }
            .text-scrollable {
                overflow: auto;
                height: 150px;
                border: 1px solid rgb(200, 200, 200);
                padding: 5px;
                font-size: 1em;
            }
            .text-centered {
                text-align: center;
            }
            .text-container {
                margin: 1em 1.5em;
            }
            .flex-container {
                display: flex;
            }
            .flex-container.column {
                flex-direction: column;
            }
        </style>
        <title>Firewall Quarantine Notification</title>
    </head>
    <body><div class=\"message-container\">
    <div class=\"logo\"></div>
    <h1>Quarantine Notification</h1>
    <form action=\"%%DISCLAIMER_ACT%%\" method=\"%%DISCLAIMER_METHOD%%\">
        <input type=\"hidden\" name=\"%%REDIRID%%\" value=\"%%PROTURI%%\">
        <input type=\"hidden\" name=\"%%MAGICID%%\" value=\"%%MAGICVAL%%\">
        <input type=\"hidden\" name=\"%%ANSWERID%%\" value=\"%%DECLINEVAL%%\">
        <p>Your network access has been restricted due to the detection of potentially malicious traffic. Please contact your network administrator for further information.</p>
        <p><b>Acknowledge your quarantine for limited network access.</b></p>
        <div class=\"form-footer\">
            <button class=\"primary\" type=\"submit\" onclick=\"sb(\'%%AGREEVAL%%\')\">Accept</button>
            <button type=\"button\" onclick=\"sb(\'%%DECLINEVAL%%\')\">Decline</button>
        </div>
    </form>
    <script>function sb(val) { document.forms[0].%%ANSWERID%%.value = val; document.forms[0].submit(); }</script>
</div></body>
</html>
