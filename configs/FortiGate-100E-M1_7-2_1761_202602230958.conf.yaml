waf_profile:
    - default:
        signature:
            main-class_100000000:
                action: block
                severity: high

            main-class_20000000:

            main-class_30000000:
                status: enable
                action: block
                severity: high

            main-class_40000000:

            main-class_50000000:
                status: enable
                action: block
                severity: high

            main-class_60000000:

            main-class_70000000:
                status: enable
                action: block
                severity: high

            main-class_80000000:
                status: enable
                severity: low

            main-class_110000000:
                status: enable
                severity: high

            main-class_90000000:
                status: enable
                action: block
                severity: high

            disabled-signature: 80080005 80200001 60030001 60120001 80080003 90410001 90410002

        constraint:
            header-length:
                status: enable
                log: enable
                severity: low

            content-length:
                status: enable
                log: enable
                severity: low

            param-length:
                status: enable
                log: enable
                severity: low

            line-length:
                status: enable
                log: enable
                severity: low

            url-param-length:
                status: enable
                log: enable
                severity: low

            version:
                log: enable

            method:
                action: block
                log: enable

            hostname:
                action: block
                log: enable

            malformed:
                log: enable

            max-cookie:
                status: enable
                log: enable
                severity: low

            max-header-line:
                status: enable
                log: enable
                severity: low

            max-url-param:
                status: enable
                log: enable
                severity: low

            max-range-segment:
                status: enable
                log: enable
                severity: high




