system_sdwan:
    status: enable
    zone:
        - virtual-wan-link:

        - Overlay_Zone:


    members:
        - 1:
            interface: "VPN_WAN1"
            zone: "Overlay_Zone"

        - 2:
            interface: "VPN_WAN2"
            zone: "Overlay_Zone"
            cost: 1
            priority: 2

        - 3:
            interface: "VPN_WAN3"
            zone: "Overlay_Zone"
            cost: 2
            priority: 3


    health-check:
        - Default_DNS:
            system-dns: enable
            interval: 1000
            probe-timeout: 1000
            recoverytime: 10
            sla:
                - 1:
                    latency-threshold: 250
                    jitter-threshold: 50
                    packetloss-threshold: 5



        - Default_Office_365:
            server: "www.office.com"
            protocol: http
            interval: 1000
            probe-timeout: 1000
            recoverytime: 10
            sla:
                - 1:
                    latency-threshold: 250
                    jitter-threshold: 50
                    packetloss-threshold: 5



        - Default_Gmail:
            server: "gmail.com"
            interval: 1000
            probe-timeout: 1000
            recoverytime: 10
            sla:
                - 1:
                    latency-threshold: 250
                    jitter-threshold: 50
                    packetloss-threshold: 2



        - Default_Google Search:
            server: "www.google.com"
            protocol: http
            interval: 1000
            probe-timeout: 1000
            recoverytime: 10
            sla:
                - 1:
                    latency-threshold: 250
                    jitter-threshold: 50
                    packetloss-threshold: 5



        - Default_FortiGuard:
            server: "fortiguard.com"
            protocol: http
            interval: 1000
            probe-timeout: 1000
            recoverytime: 10
            sla:
                - 1:
                    latency-threshold: 250
                    jitter-threshold: 50
                    packetloss-threshold: 5



        - SLA_Rule1:
            server: "192.168.3.1"
            update-cascade-interface: disable
            members: 1 2 3
            sla:
                - 1:
                    latency-threshold: 100
                    jitter-threshold: 100
                    packetloss-threshold: 10




    service:
        - 1:
            name: "VPN_Rule"
            mode: sla
            dst: "all"
            src: "all"
            sla:
                - SLA_Rule1:
                    id: 1


            priority-members: 1 2 3



