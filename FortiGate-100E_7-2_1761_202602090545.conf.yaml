firewall_profile-protocol-options:
    - default:
        comment: "All default services."
        http:
            ports: 80
            options: ~
            post-lang: ~

        ftp:
            ports: 21
            options: splice

        imap:
            ports: 143
            options: fragmail

        mapi:
            ports: 135
            options: fragmail

        pop3:
            ports: 110
            options: fragmail

        smtp:
            ports: 25
            options: fragmail splice

        nntp:
            ports: 119
            options: splice

        ssh:
            options: ~

        dns:
            ports: 53

        cifs:
            ports: 445
            options: ~



